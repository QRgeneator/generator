<!DOCTYPE html>
<html>
<head>
  <title>QR Generator Pro</title>

  <!-- Stylish Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      text-align: center;
      color: white;

      background: linear-gradient(-45deg, #ff4e50, #fc913a, #00c9ff, #92fe9d);
      background-size: 400% 400%;
      animation: gradient 10s ease infinite;
    }

    @keyframes gradient {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    h1 {
      margin-top: 30px;
      font-size: 36px;
      font-weight: 700;
      letter-spacing: 2px;
    }

    .box {
      margin-top: 30px;
      display: inline-block;
      padding: 30px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    }

    input {
      margin-top: 10px;
    }

    button {
      margin-top: 15px;
      padding: 12px 25px;
      border: none;
      border-radius: 25px;
      background: linear-gradient(45deg, #ff512f, #dd2476);
      color: white;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    #status {
      margin-top: 15px;
      font-size: 14px;
    }

    canvas {
      margin-top: 20px;
    }

    #videoSection {
      margin-top: 100px;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    video {
      width: 85%;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
  </style>
</head>

<body>

  <h1>🚀 QR Video Generator</h1>

  <div class="box">
    <h3>Upload Your Video</h3>

    <input type="file" id="videoFile" accept="video/*"><br>
    <button onclick="uploadVideo()">Upload & Generate QR</button>

    <p id="status"></p>
    <canvas id="qrcode"></canvas>
  </div>

  <!-- Video Section -->
  <div id="videoSection">
    <video id="myVideo" controls></video>
  </div>

  <script>
    const cloudName = "dkfj94uga";
    const uploadPreset = "hellopuspa";

    let videoURL = "";

    function uploadVideo() {
      const file = document.getElementById("videoFile").files[0];
      if (!file) return alert("Select a video!");

      document.getElementById("status").innerText = "Uploading...";

      const formData = new FormData();
      formData.append("file", file);
      formData.append("upload_preset", uploadPreset);

      fetch(`https://api.cloudinary.com/v1_1/${cloudName}/video/upload`, {
        method: "POST",
        body: formData
      })
      .then(res => res.json())
      .then(data => {
        videoURL = data.secure_url;

        document.getElementById("status").innerText = "QR Ready 🎉";

        QRCode.toCanvas(document.getElementById("qrcode"), videoURL);

        const video = document.getElementById("myVideo");
        video.src = videoURL;
      })
      .catch(() => {
        document.getElementById("status").innerText = "Upload failed!";
      });
    }

    // Scroll autoplay + fullscreen
    window.addEventListener("scroll", () => {
      const video = document.getElementById("myVideo");
      const rect = video.getBoundingClientRect();

      if (rect.top >= 0 && rect.bottom <= window.innerHeight) {
        video.play().catch(()=>{});
        video.requestFullscreen().catch(()=>{});
      }
    });
  </script>

</body>
</html>
